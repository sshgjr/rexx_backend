version: "3.8"

services:
  db:
    image: postgres:16-alpine
    container_name: rexx_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: rexx
      POSTGRES_PASSWORD: rexx1234
      POSTGRES_DB: rexx_strength
    ports:
      - "5432:5432"
    volumes:
      - rexx_pgdata:/var/lib/postgresql/data

volumes:
  rexx_pgdata:
